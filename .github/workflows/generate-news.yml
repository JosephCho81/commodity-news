name: Daily Commodity News Generation

on:
  # 매일 오전 7시 KST (UTC 22:00 전날) 자동 실행
  schedule:
    - cron: "0 22 * * *"
  # 수동 실행도 가능 (GitHub Actions 탭에서 Run workflow 버튼)
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Trigger generate-news API
        run: |
          RESPONSE=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X POST \
            "${{ secrets.VERCEL_APP_URL }}/api/generate-news")

          echo "HTTP Status: $RESPONSE"
          cat /tmp/response.json

          # 200 또는 201이 아니면 실패 처리
          if [ "$RESPONSE" != "200" ] && [ "$RESPONSE" != "201" ]; then
            echo "❌ API 호출 실패 — HTTP $RESPONSE"
            exit 1
          fi

          # already-exists면 성공으로 처리
          STATUS=$(cat /tmp/response.json | python3 -c "import sys,json; print(json.load(sys.stdin).get('status',''))")
          echo "Response status: $STATUS"

          if [ "$STATUS" = "already-exists" ]; then
            echo "✅ 오늘 브리핑이 이미 존재합니다"
          elif [ "$STATUS" = "generated" ]; then
            echo "✅ 오늘 브리핑 생성 완료"
          else
            echo "⚠️ 예상치 못한 status: $STATUS"
          fi
